services:
  # FastAPI Backend
  - type: web
    name: pricing-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerCommand: uvicorn src.api.app:app --host 0.0.0.0 --port 8000
    envVars:
      - key: API_HOST
        value: 0.0.0.0
      - key: API_PORT
        value: 8000
      - key: LOG_LEVEL
        value: INFO
    plan: free

  # Streamlit Dashboard
  - type: web
    name: pricing-dashboard
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerCommand: streamlit run dashboards/streamlit/app.py --server.port 8000 --server.address 0.0.0.0 --server.headless true
    envVars:
      - key: STREAMLIT_SERVER_HEADLESS
        value: true
    plan: free